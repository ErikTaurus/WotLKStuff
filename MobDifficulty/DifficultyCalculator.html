<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Difficulty calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
}

.wrapper {
  text-align: center;
}

.calculator-box {
  width: 250px;
  padding: 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: white;
}

.form-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.form-row input {
  width: 80px;
}

/* 📱 Mobil */
@media (max-width: 600px) {
  .calculator-box {
    width: 90vw;
    max-width: 400px;
  }

  .form-row input {
    width: 100px;
    font-size: 18px;
  }

  button {
    padding: 10px;
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <h3>Mobs in Wrath of the Lich King</h3>

  <div class="calculator-box" id="calcBox">
    <div class="form-row">
      <label for="player" class="things">Player level:</label>
      <input type="text" class="those" id="pl">
    </div>

    <div class="form-row">
      <label for="mob" class="things">Mob level:</label>
      <input type="text" class="those" id="ml">
    </div>

    <button onclick="calculate('pl','ml')">Calculate</button>
  </div>
</div>

<script src="difficultyCalculator.js"></script>

</body>
</html>
